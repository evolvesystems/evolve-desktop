name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.5)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build (comma-separated: windows,linux,macos)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''
      is_stable:
        description: 'Mark as stable release'
        required: false
        type: string
        default: 'true'
      is_latest:
        description: 'Mark as latest release'
        required: false
        type: string
        default: 'true'
      favicon_url:
        description: 'App icon URL (PNG, defaults to EIQ tenant favicon)'
        required: false
        type: string
        default: 'https://eiqv2-alpha.syd1.cdn.digitaloceanspaces.com/tenant-logos/favicon/1/favicon_69be39f5d4d9b.png'

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract and validate version
        id: version
        run: |
          # Get version from input (workflow_dispatch) or tag (push)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            # Remove 'v' prefix if present
            VERSION="${VERSION#v}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Read version from tauri.conf.json
          CONF_VERSION=$(jq -r '.version' evolve-desktop/src-tauri/tauri.conf.json)

          echo "Extracted version: $VERSION"
          echo "Config version: $CONF_VERSION"

          # For tag-triggered builds, versions must match
          if [ "${{ github.event_name }}" = "push" ] && [ "$VERSION" != "$CONF_VERSION" ]; then
            echo "ERROR: Tag version ($VERSION) does not match tauri.conf.json version ($CONF_VERSION)"
            exit 1
          fi

  build:
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            name: linux
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            name: windows
          - os: macos-latest
            rust_target: universal-apple-darwin
            name: macos

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Check if platform should be built
        id: should_build
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          elif echo "${{ github.event.inputs.platforms }}" | grep -qw "${{ matrix.platform.name }}"; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.should_build.outputs.build == 'true'
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        if: steps.should_build.outputs.build == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'evolve-desktop/package-lock.json'

      - name: Install Rust
        if: steps.should_build.outputs.build == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform.rust_target }}

      - name: Install dependencies (Ubuntu)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        if: steps.should_build.outputs.build == 'true'
        working-directory: evolve-desktop
        run: npm ci

      - name: Download latest sidebar JS from server
        if: steps.should_build.outputs.build == 'true'
        shell: bash
        run: |
          curl -sL "https://evolvepreneuriq.app/js/desktop-sidebar.js" -o evolve-desktop/src-tauri/src/sidebar.js
          echo "Downloaded sidebar.js: $(wc -c < evolve-desktop/src-tauri/src/sidebar.js) bytes"

      - name: Generate app icons from tenant favicon
        if: steps.should_build.outputs.build == 'true'
        shell: bash
        run: |
          # Download favicon from tenant CDN
          FAVICON_URL="${{ github.event.inputs.favicon_url || 'https://eiqv2-alpha.syd1.cdn.digitaloceanspaces.com/tenant-logos/favicon/1/favicon_69be39f5d4d9b.png' }}"
          echo "Downloading favicon from: $FAVICON_URL"
          curl -sL "$FAVICON_URL" -o ${RUNNER_TEMP}/source_icon.png

          # Install Pillow for image processing
          pip3 install Pillow --quiet --break-system-packages 2>/dev/null || pip3 install Pillow --quiet || pip install Pillow --quiet

          # Write Python icon generator script to temp file
          cat > "${RUNNER_TEMP}/gen_icons.py" << 'PYSCRIPT'
          import os, sys
          from PIL import Image
          src = Image.open(os.environ['SOURCE_ICON']).convert('RGBA')
          w, h = src.size
          # Make square with padding if non-square
          if w != h:
              s = max(w, h)
              square = Image.new('RGBA', (s, s), (255, 255, 255, 255))
              square.paste(src, ((s - w) // 2, (s - h) // 2))
              src = square
          # Ensure high res source for sharp downscaling
          if src.size[0] < 1024:
              src = src.resize((1024, 1024), Image.LANCZOS)
          print(f'  Source icon: {src.size}, mode: {src.mode}')
          icons_dir = 'evolve-desktop/src-tauri/icons'
          sizes = {'icon.png':512,'32x32.png':32,'128x128.png':128,'128x128@2x.png':256,
            'Square30x30Logo.png':30,'Square44x44Logo.png':44,'Square71x71Logo.png':71,
            'Square89x89Logo.png':89,'Square107x107Logo.png':107,'Square142x142Logo.png':142,
            'Square150x150Logo.png':150,'Square284x284Logo.png':284,'Square310x310Logo.png':310,
            'StoreLogo.png':50}
          for name, size in sizes.items():
              src.resize((size, size), Image.LANCZOS).save(os.path.join(icons_dir, name))
              print(f'  Generated {name} ({size}x{size})')
          ico_sizes = [16, 24, 32, 48, 64, 128, 256]
          ico_images = [src.resize((s, s), Image.LANCZOS) for s in ico_sizes]
          ico_images[0].save(os.path.join(icons_dir, 'icon.ico'), format='ICO', sizes=[(s, s) for s in ico_sizes])
          print('  Generated icon.ico')
          PYSCRIPT

          export SOURCE_ICON="${RUNNER_TEMP}/source_icon.png"
          python3 "${RUNNER_TEMP}/gen_icons.py"

          # Generate .icns (macOS only)
          if [ "$(uname)" = "Darwin" ]; then
            ICONSET="${RUNNER_TEMP}/EvolveApp.iconset"
            mkdir -p "$ICONSET"
            for size in 16 32 64 128 256 512 1024; do
              python3 -c "from PIL import Image; import os; Image.open(os.environ['SOURCE_ICON']).convert('RGBA').resize(($size,$size), Image.LANCZOS).save('$ICONSET/icon_${size}x${size}.png')"
            done
            cp "$ICONSET/icon_32x32.png" "$ICONSET/icon_16x16@2x.png"
            cp "$ICONSET/icon_64x64.png" "$ICONSET/icon_32x32@2x.png"
            cp "$ICONSET/icon_256x256.png" "$ICONSET/icon_128x128@2x.png"
            cp "$ICONSET/icon_512x512.png" "$ICONSET/icon_256x256@2x.png"
            cp "$ICONSET/icon_1024x1024.png" "$ICONSET/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET" -o evolve-desktop/src-tauri/icons/icon.icns
            echo '  Generated icon.icns (macOS)'
          else
            echo '  Skipping .icns (not macOS)'
          fi
          echo "Icon generation complete!"

      - name: Build Tauri app
        if: steps.should_build.outputs.build == 'true'
        working-directory: evolve-desktop
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npx tauri build --target ${{ matrix.platform.rust_target }}

          # Verify the binary architecture on macOS
          if [[ "${{ matrix.platform.os }}" == macos* ]]; then
            BINARY=$(find src-tauri/target/${{ matrix.platform.rust_target }}/release -name "evolve-desktop" -not -path "*/bundle/*" -not -path "*/deps/*" | head -1)
            if [ -n "$BINARY" ]; then
              echo "Binary architecture:"
              file "$BINARY"
              lipo -info "$BINARY" 2>/dev/null || true
            fi
          fi

      # macOS code signing: import Developer ID cert into temp keychain and sign
      - name: Import Apple certificate
        id: keychain
        if: steps.should_build.outputs.build == 'true' && startsWith(matrix.platform.os, 'macos')
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "WARNING: APPLE_CERTIFICATE_BASE64 not set — will fall back to ad-hoc signing"
            echo "has_cert=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Decode certificate
          CERTIFICATE_PATH="${RUNNER_TEMP}/certificate.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate into keychain
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list (don't set as default — that breaks other steps)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # List all identities for debugging
          echo "All identities in keychain:"
          security find-identity -v "$KEYCHAIN_PATH"

          # Extract identities using the grep-o approach that was working before.
          # sed 's/.*"\(.*\)".*/\1/' is greedy and breaks on multi-quoted lines.
          APP_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | grep -o '"[^"]*"' | head -1 | tr -d '"')
          PKG_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" | grep "Developer ID Installer" | grep -o '"[^"]*"' | head -1 | tr -d '"')

          # Fallback: use any codesigning identity (matches original working logic)
          if [ -z "$APP_IDENTITY" ]; then
            echo "WARNING: No 'Developer ID Application' cert found — using first codesigning identity"
            APP_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -o '"[^"]*"' | head -1 | tr -d '"')
          fi

          if [ -z "$APP_IDENTITY" ]; then
            echo "ERROR: No codesigning identity found at all!"
            echo "has_cert=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "App signing identity: $APP_IDENTITY"
          echo "Pkg signing identity: ${PKG_IDENTITY:-none}"
          echo "has_cert=true" >> $GITHUB_OUTPUT
          echo "keychain_path=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT
          echo "signing_identity=$APP_IDENTITY" >> $GITHUB_OUTPUT
          echo "pkg_identity=$PKG_IDENTITY" >> $GITHUB_OUTPUT
          echo "Certificate imported successfully"

      - name: Sign macOS app
        if: steps.should_build.outputs.build == 'true' && startsWith(matrix.platform.os, 'macos')
        run: |
          APP_BUNDLE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "WARNING: No .app bundle found to sign"
            exit 0
          fi

          if [ "${{ steps.keychain.outputs.has_cert }}" = "true" ]; then
            IDENTITY="${{ steps.keychain.outputs.signing_identity }}"
            ENTITLEMENTS="evolve-desktop/src-tauri/Entitlements.plist"
            echo "Signing with: $IDENTITY"

            # Sign inside-out: nested binaries/dylibs first, then the .app
            # --deep is unreliable and Apple rejects notarization if any nested
            # component is unsigned or missing hardened runtime.
            echo "Signing nested libraries and frameworks..."
            find "$APP_BUNDLE" -type f \( -name "*.dylib" -o -name "*.so" \) | while read lib; do
              echo "  Signing: $lib"
              codesign --force --options runtime --sign "$IDENTITY" --timestamp "$lib"
            done

            # Sign any nested .app bundles or frameworks
            find "$APP_BUNDLE/Contents/Frameworks" -depth -type d -name "*.framework" 2>/dev/null | while read fw; do
              echo "  Signing framework: $fw"
              codesign --force --options runtime --sign "$IDENTITY" --timestamp "$fw"
            done

            # Sign helper executables
            find "$APP_BUNDLE/Contents/MacOS" -type f -perm +111 ! -name "$(basename "$APP_BUNDLE" .app)" | while read helper; do
              echo "  Signing helper: $helper"
              codesign --force --options runtime --sign "$IDENTITY" --entitlements "$ENTITLEMENTS" --timestamp "$helper"
            done

            # Sign the main binary
            MAIN_BIN="$APP_BUNDLE/Contents/MacOS/$(basename "$APP_BUNDLE" .app)"
            if [ -f "$MAIN_BIN" ]; then
              echo "Signing main binary: $MAIN_BIN"
              codesign --force --options runtime --sign "$IDENTITY" --entitlements "$ENTITLEMENTS" --timestamp "$MAIN_BIN"
            fi

            # Sign the outer .app bundle
            echo "Signing app bundle..."
            codesign --force --options runtime \
              --sign "$IDENTITY" \
              --entitlements "$ENTITLEMENTS" \
              --timestamp \
              "$APP_BUNDLE"

            echo "Verifying signature..."
            codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"
            echo "Checking Gatekeeper acceptance..."
            spctl --assess --type exec --verbose=2 "$APP_BUNDLE" || echo "WARNING: spctl check failed — notarization required"
            echo "Signature valid!"
          else
            echo "WARNING: No certificate available — falling back to ad-hoc signing"
            echo "The resulting DMG will trigger 'damaged app' on macOS Gatekeeper"
            codesign --force --deep --sign - "$APP_BUNDLE"
          fi

      # Create polished DMG with drag-to-Applications layout
      - name: Create DMG with signed app
        if: steps.should_build.outputs.build == 'true' && startsWith(matrix.platform.os, 'macos')
        run: |
          APP_BUNDLE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "No .app bundle found — skipping DMG creation"
            exit 0
          fi

          VERSION=$(jq -r '.version' evolve-desktop/src-tauri/tauri.conf.json)
          DMG_DIR="evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          DMG_FILE="$DMG_DIR/EvolveApp_${VERSION}_universal.dmg"
          rm -f "$DMG_DIR"/*.dmg

          # Install create-dmg for polished DMG with Applications shortcut
          brew install create-dmg || true

          create-dmg \
            --volname "EvolveApp" \
            --volicon "evolve-desktop/src-tauri/icons/icon.icns" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "EvolveApp.app" 180 170 \
            --app-drop-link 480 170 \
            --hide-extension "EvolveApp.app" \
            --no-internet-enable \
            "$DMG_FILE" \
            "$APP_BUNDLE" \
          || {
            # Fallback: basic DMG with Applications symlink
            echo "create-dmg failed — falling back to hdiutil with Applications symlink"
            STAGING="${RUNNER_TEMP}/dmg-staging"
            mkdir -p "$STAGING"
            cp -R "$APP_BUNDLE" "$STAGING/"
            ln -s /Applications "$STAGING/Applications"
            hdiutil create -volname "EvolveApp" -srcfolder "$STAGING" -ov -format UDZO "$DMG_FILE"
          }

          echo "DMG created: $(ls -lh "$DMG_FILE")"

      # Notarize DMG with Apple (required for Gatekeeper to trust the app)
      - name: Notarize macOS DMG
        if: steps.should_build.outputs.build == 'true' && startsWith(matrix.platform.os, 'macos') && steps.keychain.outputs.has_cert == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "WARNING: Apple notarization credentials incomplete — skipping"
            echo "  APPLE_ID set: $([ -n "$APPLE_ID" ] && echo yes || echo NO)"
            echo "  APPLE_APP_PASSWORD set: $([ -n "$APPLE_APP_PASSWORD" ] && echo yes || echo NO)"
            echo "  APPLE_TEAM_ID set: $([ -n "$APPLE_TEAM_ID" ] && echo yes || echo NO)"
            exit 0
          fi
          DMG_FILE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "No DMG found — skipping notarization"
            exit 0
          fi
          echo "Submitting $DMG_FILE for notarization..."
          xcrun notarytool submit "$DMG_FILE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 600 2>&1 | tee "${RUNNER_TEMP}/notarize-dmg.log"
          NOTARY_STATUS=${PIPESTATUS[0]}

          if [ $NOTARY_STATUS -ne 0 ]; then
            echo "ERROR: Notarization FAILED!"
            # Try to get the log for details
            SUBMISSION_ID=$(grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' "${RUNNER_TEMP}/notarize-dmg.log" | head -1)
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG_FILE"
          echo "Notarization complete! App will be trusted by Gatekeeper."

      # Build signed PKG installer
      - name: Build PKG installer
        if: steps.should_build.outputs.build == 'true' && startsWith(matrix.platform.os, 'macos') && steps.keychain.outputs.has_cert == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_BUNDLE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "No .app bundle — skipping PKG"
            exit 0
          fi

          VERSION=$(jq -r '.version' evolve-desktop/src-tauri/tauri.conf.json)
          PKG_DIR="evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/pkg"
          mkdir -p "$PKG_DIR"

          PKG_IDENTITY="${{ steps.keychain.outputs.pkg_identity }}"

          # Build component pkg (--component installs the .app bundle as-is into /Applications)
          pkgbuild \
            --component "$APP_BUNDLE" \
            --install-location "/Applications" \
            --identifier "com.evolveapp.desktop" \
            --version "$VERSION" \
            "${RUNNER_TEMP}/EvolveApp-component.pkg"

          # Build product archive
          if [ -n "$PKG_IDENTITY" ]; then
            echo "Signing PKG with: $PKG_IDENTITY"
            productbuild \
              --package "${RUNNER_TEMP}/EvolveApp-component.pkg" \
              --sign "$PKG_IDENTITY" \
              "$PKG_DIR/EvolveApp_${VERSION}_universal.pkg"
          else
            echo "No Installer cert — building unsigned PKG"
            productbuild \
              --package "${RUNNER_TEMP}/EvolveApp-component.pkg" \
              "$PKG_DIR/EvolveApp_${VERSION}_universal.pkg"
          fi

          echo "PKG created: $(ls -lh "$PKG_DIR/EvolveApp_${VERSION}_universal.pkg")"

          # Notarize PKG
          if [ -n "$PKG_IDENTITY" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            PKG_FILE="$PKG_DIR/EvolveApp_${VERSION}_universal.pkg"
            echo "Submitting PKG for notarization..."
            xcrun notarytool submit "$PKG_FILE" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --timeout 600 2>&1 | tee "${RUNNER_TEMP}/notarize-pkg.log"
            NOTARY_STATUS=${PIPESTATUS[0]}

            if [ $NOTARY_STATUS -ne 0 ]; then
              echo "ERROR: PKG notarization FAILED!"
              SUBMISSION_ID=$(grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' "${RUNNER_TEMP}/notarize-pkg.log" | head -1)
              if [ -n "$SUBMISSION_ID" ]; then
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_APP_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
              fi
              exit 1
            fi

            xcrun stapler staple "$PKG_FILE"
            echo "PKG notarized and stapled!"
          fi

      # Clean up temporary keychain
      - name: Clean up keychain
        if: always() && steps.should_build.outputs.build == 'true' && startsWith(matrix.platform.os, 'macos')
        run: |
          KEYCHAIN_PATH="${{ steps.keychain.outputs.keychain_path }}"
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
            echo "Temporary keychain cleaned up"
          fi

      # Build Flatpak for universal Linux support (works on Fedora, Arch, old distros)
      - name: Build Flatpak
        continue-on-error: true
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//46 org.gnome.Sdk//46

          # Prepare Flatpak build directory
          mkdir -p flatpak-build
          BINARY="evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/evolve-desktop"
          cp "$BINARY" flatpak-build/evolve-desktop
          cp evolve-desktop/src-tauri/icons/icon.png flatpak-build/icon.png
          cp evolve-desktop/com.evolveapp.desktop.desktop flatpak-build/com.evolveapp.desktop.desktop
          cp evolve-desktop/evolve-desktop-wrapper.sh flatpak-build/evolve-desktop-wrapper.sh
          cp evolve-desktop/com.evolveapp.desktop.yml flatpak-build/
          cp -r evolve-desktop/shared-modules flatpak-build/shared-modules

          cd flatpak-build
          flatpak-builder --force-clean --repo=repo build-dir com.evolveapp.desktop.yml
          flatpak build-bundle repo EvolveApp_${{ needs.validate-version.outputs.version }}.flatpak com.evolveapp.desktop
          echo "Flatpak built: $(ls -la EvolveApp_${{ needs.validate-version.outputs.version }}.flatpak)"

      - name: Upload artifacts (Linux)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v5
        with:
          name: linux-${{ matrix.platform.rust_target }}
          path: |
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/deb/*.deb
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/deb/*.deb.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/appimage/*.AppImage
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/appimage/*.AppImage.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/rpm/*.rpm
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/rpm/*.rpm.sig
            flatpak-build/EvolveApp_${{ needs.validate-version.outputs.version }}.flatpak
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/**/*.json

      - name: Upload artifacts (Windows)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: windows-${{ matrix.platform.rust_target }}
          path: |
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/msi/*.msi
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/msi/*.msi.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/nsis/*.exe
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/nsis/*.exe.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/**/*.json

      - name: Upload artifacts (macOS)
        if: steps.should_build.outputs.build == 'true' && startsWith(matrix.platform.os, 'macos')
        uses: actions/upload-artifact@v5
        with:
          name: macos-${{ matrix.platform.rust_target }}
          path: |
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg/*.dmg
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg/*.dmg.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/pkg/*.pkg
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/**/*.json

  release:
    needs: [validate-version, build]
    runs-on: ubuntu-latest
    if: always() && !failure() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          name: Release v${{ needs.validate-version.outputs.version }}
          body: ${{ github.event.inputs.release_notes || 'Automated release build' }}
          draft: false
          prerelease: ${{ github.event.inputs.is_stable == 'false' }}
          files: |
            artifacts/**/*.deb
            artifacts/**/*.deb.sig
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            artifacts/**/*.flatpak
            artifacts/**/*.rpm
            artifacts/**/*.rpm.sig
            artifacts/**/*.msi
            artifacts/**/*.msi.sig
            artifacts/**/*.exe
            artifacts/**/*.exe.sig
            artifacts/**/*.dmg
            artifacts/**/*.dmg.sig
            artifacts/**/*.pkg
            artifacts/**/*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
