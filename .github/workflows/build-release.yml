name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.5)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build (comma-separated: windows,linux,macos-intel,macos-arm)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''
      is_stable:
        description: 'Mark as stable release'
        required: false
        type: string
        default: 'true'
      is_latest:
        description: 'Mark as latest release'
        required: false
        type: string
        default: 'true'
      favicon_url:
        description: 'App icon URL (PNG, defaults to EIQ tenant favicon)'
        required: false
        type: string
        default: 'https://eiqv2-alpha.syd1.cdn.digitaloceanspaces.com/tenant-logos/favicon/1/favicon_69be39f5d4d9b.png'

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          # Get version from input (workflow_dispatch) or tag (push)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            # Remove 'v' prefix if present
            VERSION="${VERSION#v}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Read version from tauri.conf.json
          CONF_VERSION=$(jq -r '.version' evolve-desktop/src-tauri/tauri.conf.json)

          echo "Extracted version: $VERSION"
          echo "Config version: $CONF_VERSION"

          # For tag-triggered builds, versions must match
          if [ "${{ github.event_name }}" = "push" ] && [ "$VERSION" != "$CONF_VERSION" ]; then
            echo "ERROR: Tag version ($VERSION) does not match tauri.conf.json version ($CONF_VERSION)"
            exit 1
          fi

  build:
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            name: linux
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            name: windows
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            name: macos-intel
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            name: macos-arm

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Check if platform should be built
        id: should_build
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          elif echo "${{ github.event.inputs.platforms }}" | grep -qw "${{ matrix.platform.name }}"; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.should_build.outputs.build == 'true'
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        if: steps.should_build.outputs.build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'evolve-desktop/package-lock.json'

      - name: Install Rust
        if: steps.should_build.outputs.build == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Install dependencies (Ubuntu)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        if: steps.should_build.outputs.build == 'true'
        working-directory: evolve-desktop
        run: npm ci

      - name: Generate app icons from tenant favicon
        if: steps.should_build.outputs.build == 'true'
        shell: bash
        run: |
          # Download favicon from tenant CDN
          FAVICON_URL="${{ github.event.inputs.favicon_url || 'https://eiqv2-alpha.syd1.cdn.digitaloceanspaces.com/tenant-logos/favicon/1/favicon_69be39f5d4d9b.png' }}"
          echo "Downloading favicon from: $FAVICON_URL"
          curl -sL "$FAVICON_URL" -o ${RUNNER_TEMP}/source_icon.png

          # Install Pillow for image processing
          pip3 install Pillow --quiet --break-system-packages 2>/dev/null || pip3 install Pillow --quiet || pip install Pillow --quiet

          # Write Python icon generator script to temp file
          cat > "${RUNNER_TEMP}/gen_icons.py" << 'PYSCRIPT'
          import os, sys
          from PIL import Image
          src = Image.open(os.environ['SOURCE_ICON']).convert('RGBA')
          w, h = src.size
          # Make square with padding if non-square
          if w != h:
              s = max(w, h)
              square = Image.new('RGBA', (s, s), (255, 255, 255, 255))
              square.paste(src, ((s - w) // 2, (s - h) // 2))
              src = square
          # Ensure high res source for sharp downscaling
          if src.size[0] < 1024:
              src = src.resize((1024, 1024), Image.LANCZOS)
          print(f'  Source icon: {src.size}, mode: {src.mode}')
          icons_dir = 'evolve-desktop/src-tauri/icons'
          sizes = {'icon.png':512,'32x32.png':32,'128x128.png':128,'128x128@2x.png':256,
            'Square30x30Logo.png':30,'Square44x44Logo.png':44,'Square71x71Logo.png':71,
            'Square89x89Logo.png':89,'Square107x107Logo.png':107,'Square142x142Logo.png':142,
            'Square150x150Logo.png':150,'Square284x284Logo.png':284,'Square310x310Logo.png':310,
            'StoreLogo.png':50}
          for name, size in sizes.items():
              src.resize((size, size), Image.LANCZOS).save(os.path.join(icons_dir, name))
              print(f'  Generated {name} ({size}x{size})')
          ico_sizes = [16, 24, 32, 48, 64, 128, 256]
          ico_images = [src.resize((s, s), Image.LANCZOS) for s in ico_sizes]
          ico_images[0].save(os.path.join(icons_dir, 'icon.ico'), format='ICO', sizes=[(s, s) for s in ico_sizes])
          print('  Generated icon.ico')
          PYSCRIPT

          export SOURCE_ICON="${RUNNER_TEMP}/source_icon.png"
          python3 "${RUNNER_TEMP}/gen_icons.py"

          # Generate .icns (macOS only)
          if [ "$(uname)" = "Darwin" ]; then
            ICONSET="${RUNNER_TEMP}/EvolveApp.iconset"
            mkdir -p "$ICONSET"
            for size in 16 32 64 128 256 512 1024; do
              python3 -c "from PIL import Image; import os; Image.open(os.environ['SOURCE_ICON']).convert('RGBA').resize(($size,$size), Image.LANCZOS).save('$ICONSET/icon_${size}x${size}.png')"
            done
            cp "$ICONSET/icon_32x32.png" "$ICONSET/icon_16x16@2x.png"
            cp "$ICONSET/icon_64x64.png" "$ICONSET/icon_32x32@2x.png"
            cp "$ICONSET/icon_256x256.png" "$ICONSET/icon_128x128@2x.png"
            cp "$ICONSET/icon_512x512.png" "$ICONSET/icon_256x256@2x.png"
            cp "$ICONSET/icon_1024x1024.png" "$ICONSET/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET" -o evolve-desktop/src-tauri/icons/icon.icns
            echo '  Generated icon.icns (macOS)'
          else
            echo '  Skipping .icns (not macOS)'
          fi
          echo "Icon generation complete!"

      - name: Build Tauri app
        if: steps.should_build.outputs.build == 'true'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: evolve-desktop
          args: --target ${{ matrix.platform.rust_target }}
          releaseId: 0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # macOS code signing + notarization (handles both proper cert and ad-hoc fallback)
      - name: Sign macOS app
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        continue-on-error: true
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_BUNDLE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "WARNING: No .app bundle found to sign"
            exit 0
          fi

          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Importing Apple Developer certificate..."
            KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
            KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security default-keychain -s "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
            security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

            echo "Signing with Developer ID: $APPLE_SIGNING_IDENTITY"
            codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" --timestamp --options=runtime "$APP_BUNDLE"
            codesign --verify --verbose --deep "$APP_BUNDLE"
          else
            echo "No Apple certificate configured — using ad-hoc signing"
            codesign --force --deep --sign - "$APP_BUNDLE"
            codesign --verify --verbose "$APP_BUNDLE" || true
          fi

      # Rebuild DMG after signing
      - name: Rebuild DMG with signed app
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        run: |
          DMG_FILE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg -name "*.dmg" | head -1)
          APP_BUNDLE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -n "$DMG_FILE" ] && [ -n "$APP_BUNDLE" ]; then
            echo "Rebuilding DMG with signed app..."
            DMG_NAME=$(basename "$DMG_FILE")
            DMG_DIR=$(dirname "$DMG_FILE")
            rm -f "$DMG_FILE"
            hdiutil create -volname "EvolveApp" -srcfolder "$APP_BUNDLE" -ov -format UDZO "$DMG_DIR/$DMG_NAME"
            echo "DMG rebuilt: $DMG_DIR/$DMG_NAME"
          fi

      # Notarize DMG with Apple (optional — skipped if no Apple ID configured)
      - name: Notarize macOS DMG
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "No Apple ID configured — skipping notarization"
            exit 0
          fi
          DMG_FILE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "No DMG found — skipping notarization"
            exit 0
          fi
          echo "Submitting $DMG_FILE for notarization..."
          xcrun notarytool submit "$DMG_FILE" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_FILE"
          echo "Notarization complete!"

      # Clean up temporary keychain
      - name: Clean up keychain
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      # Build Flatpak for universal Linux support (works on Fedora, Arch, old distros)
      - name: Build Flatpak
        continue-on-error: true
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//46 org.gnome.Sdk//46

          # Prepare Flatpak build directory
          mkdir -p flatpak-build
          BINARY="evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/evolve-desktop"
          cp "$BINARY" flatpak-build/evolve-desktop
          cp evolve-desktop/src-tauri/icons/icon.png flatpak-build/icon.png
          cp evolve-desktop/com.evolveapp.desktop.desktop flatpak-build/com.evolveapp.desktop.desktop
          cp evolve-desktop/com.evolveapp.desktop.yml flatpak-build/
          cp -r evolve-desktop/shared-modules flatpak-build/shared-modules

          cd flatpak-build
          flatpak-builder --force-clean --repo=repo build-dir com.evolveapp.desktop.yml
          flatpak build-bundle repo EvolveApp_${{ needs.validate-version.outputs.version }}.flatpak com.evolveapp.desktop
          echo "Flatpak built: $(ls -la EvolveApp_${{ needs.validate-version.outputs.version }}.flatpak)"

      - name: Upload artifacts (Linux)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.platform.rust_target }}
          path: |
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/deb/*.deb
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/deb/*.deb.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/appimage/*.AppImage
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/appimage/*.AppImage.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/rpm/*.rpm
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/rpm/*.rpm.sig
            flatpak-build/EvolveApp_${{ needs.validate-version.outputs.version }}.flatpak
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/**/*.json

      - name: Upload artifacts (Windows)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.platform.rust_target }}
          path: |
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/msi/*.msi
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/msi/*.msi.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/nsis/*.exe
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/nsis/*.exe.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/**/*.json

      - name: Upload artifacts (macOS)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.platform.rust_target }}
          path: |
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg/*.dmg
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg/*.dmg.sig
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/**/*.json

  release:
    needs: [validate-version, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          name: Release v${{ needs.validate-version.outputs.version }}
          body: ${{ github.event.inputs.release_notes || 'Automated release build' }}
          draft: false
          prerelease: ${{ github.event.inputs.is_stable == 'false' }}
          files: |
            artifacts/**/*.deb
            artifacts/**/*.deb.sig
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            artifacts/**/*.flatpak
            artifacts/**/*.rpm
            artifacts/**/*.rpm.sig
            artifacts/**/*.msi
            artifacts/**/*.msi.sig
            artifacts/**/*.exe
            artifacts/**/*.exe.sig
            artifacts/**/*.dmg
            artifacts/**/*.dmg.sig
            artifacts/**/*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
