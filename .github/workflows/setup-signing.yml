name: Setup Update Signing Keys

on:
  workflow_dispatch:

jobs:
  generate-keys:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Tauri signing key pair
        run: |
          npm install @tauri-apps/cli@2

          # Pipe empty password to avoid interactive prompt
          printf '\n\n' | npx tauri signer generate -w $RUNNER_TEMP/tauri.key 2>&1 && echo "Generated with tauri CLI" || {
            # If that fails, try with expect
            apt-get update -qq && apt-get install -y -qq expect > /dev/null 2>&1 || true
            expect -c '
              spawn npx tauri signer generate -w env(RUNNER_TEMP)/tauri.key
              expect "password"
              send "\r"
              expect "password"
              send "\r"
              expect eof
            ' 2>&1 || echo "expect also failed"
          }

          if [ -f "$RUNNER_TEMP/tauri.key.pub" ]; then
            echo "Key pair generated!"
            PUBKEY=$(cat $RUNNER_TEMP/tauri.key.pub)
            echo "PUBKEY=$PUBKEY" >> $GITHUB_ENV
            gh secret set TAURI_SIGNING_PRIVATE_KEY < $RUNNER_TEMP/tauri.key
            echo "" | gh secret set TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          else
            echo "::error::Failed to generate key pair"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update tauri.conf.json
        run: |
          python3 -c "
          import json
          with open('evolve-desktop/src-tauri/tauri.conf.json') as f:
              conf = json.load(f)
          conf['plugins']['updater']['pubkey'] = '${{ env.PUBKEY }}'
          conf['bundle']['createUpdaterArtifacts'] = True
          with open('evolve-desktop/src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Updated tauri.conf.json')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evolve-desktop/src-tauri/tauri.conf.json
          git diff --cached --quiet || git commit -m "feat: enable auto-updater with signing pubkey

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
          git push

      - name: Summary
        run: |
          echo "## Signing Key Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Public key: \`$PUBKEY\`" >> $GITHUB_STEP_SUMMARY
          echo "- Private key saved to \`TAURI_SIGNING_PRIVATE_KEY\` secret" >> $GITHUB_STEP_SUMMARY
          echo "- \`createUpdaterArtifacts\` enabled in tauri.conf.json" >> $GITHUB_STEP_SUMMARY
          echo "- Next build will produce signed update artifacts" >> $GITHUB_STEP_SUMMARY
