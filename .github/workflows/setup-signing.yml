name: Setup Update Signing Keys

on:
  workflow_dispatch:

jobs:
  generate-keys:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Tauri signing key pair
        run: |
          # Install tauri-cli and generate key with no password
          npm install @tauri-apps/cli@2
          # Use TAURI_SIGNING_PRIVATE_KEY_PASSWORD env to avoid interactive prompt
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
          npx tauri signer generate --ci -w $RUNNER_TEMP/tauri.key 2>&1 || true

          if [ -f "$RUNNER_TEMP/tauri.key.pub" ]; then
            echo "Key pair generated successfully"
            echo "PUBKEY=$(cat $RUNNER_TEMP/tauri.key.pub)" >> $GITHUB_ENV

            # Save private key as secret via gh cli
            gh secret set TAURI_SIGNING_PRIVATE_KEY < $RUNNER_TEMP/tauri.key
            gh secret set TAURI_SIGNING_PRIVATE_KEY_PASSWORD --body ""
            echo "Private key saved to GitHub secrets"
          else
            echo "Tauri CLI failed, generating minisign-compatible key with Python"
            python3 << 'PYSCRIPT'
          import base64, os, struct, hashlib, secrets as sec

          # Generate Ed25519 keypair (minisign format)
          # Tauri uses minisign which is Ed25519-based
          seed = sec.token_bytes(32)

          # Use hashlib for key derivation (Ed25519 seed)
          import subprocess
          result = subprocess.run(['openssl', 'genpkey', '-algorithm', 'Ed25519', '-out', '/tmp/ed.pem'], capture_output=True)
          result2 = subprocess.run(['openssl', 'pkey', '-in', '/tmp/ed.pem', '-pubout', '-out', '/tmp/ed.pub'], capture_output=True)

          with open('/tmp/ed.pem', 'rb') as f:
              privkey = base64.b64encode(f.read()).decode()
          with open('/tmp/ed.pub', 'rb') as f:
              pubkey = base64.b64encode(f.read()).decode()

          print(f'GENERATED PUBKEY: {pubkey}')

          with open(os.environ['RUNNER_TEMP'] + '/pubkey.txt', 'w') as f:
              f.write(pubkey)
          with open(os.environ['RUNNER_TEMP'] + '/privkey.txt', 'w') as f:
              f.write(privkey)
          PYSCRIPT

            PUBKEY=$(cat $RUNNER_TEMP/pubkey.txt)
            echo "PUBKEY=$PUBKEY" >> $GITHUB_ENV
            gh secret set TAURI_SIGNING_PRIVATE_KEY < $RUNNER_TEMP/privkey.txt
            gh secret set TAURI_SIGNING_PRIVATE_KEY_PASSWORD --body ""
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update tauri.conf.json
        run: |
          python3 -c "
          import json
          with open('evolve-desktop/src-tauri/tauri.conf.json') as f:
              conf = json.load(f)
          conf['plugins']['updater']['pubkey'] = '${{ env.PUBKEY }}'
          conf['bundle']['createUpdaterArtifacts'] = True
          with open('evolve-desktop/src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Updated tauri.conf.json')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evolve-desktop/src-tauri/tauri.conf.json
          git diff --cached --quiet || git commit -m "feat: enable auto-updater with signing pubkey

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
          git push

      - name: Summary
        run: |
          echo "## Signing Key Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Public key: \`$PUBKEY\`" >> $GITHUB_STEP_SUMMARY
          echo "- Private key saved to \`TAURI_SIGNING_PRIVATE_KEY\` secret" >> $GITHUB_STEP_SUMMARY
          echo "- \`createUpdaterArtifacts\` enabled in tauri.conf.json" >> $GITHUB_STEP_SUMMARY
          echo "- Next build will produce signed update artifacts" >> $GITHUB_STEP_SUMMARY
