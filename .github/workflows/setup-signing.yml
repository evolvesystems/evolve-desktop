name: Setup Update Signing Keys

on:
  workflow_dispatch:

jobs:
  generate-keys:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2

      - name: Generate signing key pair
        run: |
          # Generate key pair with empty password for CI
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="" npx @tauri-apps/cli signer generate -w $RUNNER_TEMP/update.key --ci 2>&1 || {
            # Fallback: use expect-style input
            echo "" | npx @tauri-apps/cli signer generate -w $RUNNER_TEMP/update.key 2>&1 || true
          }

          # Check if keys were generated
          if [ -f "$RUNNER_TEMP/update.key" ] && [ -f "$RUNNER_TEMP/update.key.pub" ]; then
            echo "Keys generated successfully"
            PRIVKEY=$(cat $RUNNER_TEMP/update.key)
            PUBKEY=$(cat $RUNNER_TEMP/update.key.pub)
            echo "PUBLIC_KEY=$PUBKEY" >> $GITHUB_ENV
            echo "PRIVATE_KEY<<EOF" >> $GITHUB_ENV
            echo "$PRIVKEY" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "Key generation failed, trying alternative method..."
            # Generate Ed25519 key pair using openssl
            openssl genpkey -algorithm ed25519 -out $RUNNER_TEMP/ed25519.pem
            PRIVKEY=$(base64 -i $RUNNER_TEMP/ed25519.pem)
            PUBKEY=$(openssl pkey -in $RUNNER_TEMP/ed25519.pem -pubout | base64)
            echo "PUBLIC_KEY=$PUBKEY" >> $GITHUB_ENV
            echo "PRIVATE_KEY=$PRIVKEY" >> $GITHUB_ENV
          fi

      - name: Save private key as GitHub secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$PRIVATE_KEY" | gh secret set TAURI_SIGNING_PRIVATE_KEY
          echo "" | gh secret set TAURI_SIGNING_PRIVATE_KEY_PASSWORD

      - name: Update tauri.conf.json with public key
        run: |
          cd evolve-desktop/src-tauri
          # Update pubkey in tauri.conf.json
          python3 -c "
          import json
          with open('tauri.conf.json') as f:
              conf = json.load(f)
          conf['plugins']['updater']['pubkey'] = '${{ env.PUBLIC_KEY }}'
          conf['bundle']['createUpdaterArtifacts'] = True
          with open('tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Updated tauri.conf.json with pubkey and enabled updater artifacts')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evolve-desktop/src-tauri/tauri.conf.json
          git commit -m "feat: enable auto-updater with signing key

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>" || echo "No changes to commit"
          git push

      - name: Output public key
        run: |
          echo "========================================="
          echo "PUBLIC KEY (for reference):"
          echo "$PUBLIC_KEY"
          echo "========================================="
          echo "Private key saved to TAURI_SIGNING_PRIVATE_KEY secret"
          echo "tauri.conf.json updated with pubkey"
          echo "createUpdaterArtifacts enabled"
          echo "========================================="
