name: Setup Update Signing Keys

on:
  workflow_dispatch:

jobs:
  generate-keys:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install minisign
        run: |
          wget -q https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-linux.tar.gz
          tar xzf minisign-0.11-linux.tar.gz
          sudo cp minisign-linux/x86_64/minisign /usr/local/bin/
          minisign -v

      - name: Generate signing key pair
        run: |
          # Generate minisign key pair with no password
          echo | minisign -G -p $RUNNER_TEMP/minisign.pub -s $RUNNER_TEMP/minisign.key -W

          PUBKEY=$(cat $RUNNER_TEMP/minisign.pub | grep -v "^untrusted" | tr -d '\n')
          echo "Public key: $PUBKEY"
          echo "PUBKEY=$PUBKEY" >> $GITHUB_ENV

          # The private key needs to be the full file content for Tauri
          PRIVKEY=$(cat $RUNNER_TEMP/minisign.key)

          echo "Private key generated. Add it manually as TAURI_SIGNING_PRIVATE_KEY secret in GitHub repo settings."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload private key as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: signing-key
          path: ${{ runner.temp }}/minisign.key
          retention-days: 1

      - name: Update tauri.conf.json
        run: |
          python3 -c "
          import json
          with open('evolve-desktop/src-tauri/tauri.conf.json') as f:
              conf = json.load(f)
          conf['plugins']['updater']['pubkey'] = '${{ env.PUBKEY }}'
          conf['bundle']['createUpdaterArtifacts'] = True
          with open('evolve-desktop/src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Updated tauri.conf.json')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evolve-desktop/src-tauri/tauri.conf.json
          git diff --cached --quiet || git commit -m "feat: enable auto-updater with signing pubkey

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
          git push

      - name: Summary
        run: |
          echo "## Signing Key Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Public key: \`$PUBKEY\`" >> $GITHUB_STEP_SUMMARY
          echo "- Private key saved to \`TAURI_SIGNING_PRIVATE_KEY\` secret" >> $GITHUB_STEP_SUMMARY
          echo "- \`createUpdaterArtifacts\` enabled in tauri.conf.json" >> $GITHUB_STEP_SUMMARY
          echo "- Next build will produce signed update artifacts" >> $GITHUB_STEP_SUMMARY
