name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.5)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build (comma-separated: windows,linux,macos-intel,macos-arm)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''
      is_stable:
        description: 'Mark as stable release'
        required: false
        type: string
        default: 'true'
      is_latest:
        description: 'Mark as latest release'
        required: false
        type: string
        default: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            name: linux
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            name: windows
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            name: macos-intel
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            name: macos-arm

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Check if platform should be built
        id: should_build
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          elif echo "${{ github.event.inputs.platforms }}" | grep -qw "${{ matrix.platform.name }}"; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.should_build.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.should_build.outputs.build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'evolve-desktop/package-lock.json'

      - name: Install Rust
        if: steps.should_build.outputs.build == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Install dependencies (Ubuntu)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        if: steps.should_build.outputs.build == 'true'
        working-directory: evolve-desktop
        run: npm ci

      - name: Build Tauri app
        if: steps.should_build.outputs.build == 'true'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: evolve-desktop
          args: --target ${{ matrix.platform.rust_target }}
          releaseId: 0

      # ── macOS Code Signing + Notarization ─────────────────────────
      #
      # Signs with Developer ID Application certificate, then submits
      # to Apple's notary service. This is required for Gatekeeper to
      # allow the app on macOS Sonoma+ without "unidentified developer".
      #
      # GitHub Secrets required:
      #   APPLE_CERTIFICATE_BASE64   — base64-encoded .p12 export
      #   APPLE_CERTIFICATE_PASSWORD — .p12 export password
      #   APPLE_TEAM_ID              — Apple Developer Team ID
      #   APPLE_ID                   — Apple ID email
      #   APPLE_APP_PASSWORD         — app-specific password for notarytool

      - name: Import Apple signing certificate
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')

          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No Developer ID Application identity found"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          # Also find the Developer ID Installer identity for PKG signing
          INSTALLER_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" \
            | grep "Developer ID Installer" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')

          if [ -z "$INSTALLER_IDENTITY" ]; then
            echo "WARNING: No Developer ID Installer identity found — PKG signing will be skipped"
            security find-identity -v "$KEYCHAIN_PATH"
          else
            echo "Installer identity: $INSTALLER_IDENTITY"
          fi

          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "INSTALLER_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "Signing identity: $IDENTITY"
          rm -f certificate.p12

      - name: Sign macOS app bundle
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        run: |
          APP_BUNDLE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found"
            exit 1
          fi

          echo "Signing: $APP_BUNDLE with $SIGNING_IDENTITY"
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" \
            --timestamp --deep "$APP_BUNDLE"

          echo "Verifying..."
          codesign --verify --verbose=2 "$APP_BUNDLE"

      - name: Rebuild DMG with signed app
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        run: |
          DMG_FILE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg -name "*.dmg" | head -1)
          APP_BUNDLE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -n "$DMG_FILE" ] && [ -n "$APP_BUNDLE" ]; then
            echo "Rebuilding DMG with signed app..."
            DMG_NAME=$(basename "$DMG_FILE")
            DMG_DIR=$(dirname "$DMG_FILE")
            rm -f "$DMG_FILE"
            hdiutil create -volname "EvolveApp" -srcfolder "$APP_BUNDLE" \
              -ov -format UDZO "$DMG_DIR/$DMG_NAME"
            echo "DMG rebuilt: $DMG_DIR/$DMG_NAME"
          fi

      - name: Build signed PKG installer
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest' && env.INSTALLER_IDENTITY != ''
        run: |
          APP_BUNDLE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found"
            exit 1
          fi

          APP_NAME=$(basename "$APP_BUNDLE" .app)
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          PKG_DIR="evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/pkg"
          mkdir -p "$PKG_DIR"
          PKG_FILE="$PKG_DIR/${APP_NAME}_${VERSION}_${{ matrix.platform.rust_target }}.pkg"

          echo "Building PKG: $PKG_FILE"
          pkgbuild \
            --component "$APP_BUNDLE" \
            --install-location /Applications \
            --sign "$INSTALLER_IDENTITY" \
            --timestamp \
            "$PKG_FILE"

          echo "Verifying PKG signature..."
          pkgutil --check-signature "$PKG_FILE"
          echo "PKG built: $PKG_FILE"

      - name: Notarize macOS DMG and PKG
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Notarize DMG
          DMG_FILE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG_FILE" ]; then
            echo "Submitting DMG for notarization: $DMG_FILE"
            xcrun notarytool submit "$DMG_FILE" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 600
            xcrun stapler staple "$DMG_FILE"
            echo "DMG notarized"
          fi

          # Notarize PKG
          PKG_FILE=$(find evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/pkg -name "*.pkg" 2>/dev/null | head -1)
          if [ -n "$PKG_FILE" ]; then
            echo "Submitting PKG for notarization: $PKG_FILE"
            xcrun notarytool submit "$PKG_FILE" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 600
            xcrun stapler staple "$PKG_FILE"
            echo "PKG notarized"
          fi

          echo "Done — signed and notarized"

      - name: Clean up signing keychain
        if: always() && matrix.platform.os == 'macos-latest'
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Upload artifacts (Linux)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.platform.rust_target }}
          path: |
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/deb/*.deb
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/appimage/*.AppImage
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/rpm/*.rpm

      - name: Upload artifacts (Windows)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.platform.rust_target }}
          path: |
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/msi/*.msi
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.platform.rust_target }}
          path: |
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg/*.dmg
            evolve-desktop/src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/pkg/*.pkg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version || github.ref_name }}
          name: Release v${{ github.event.inputs.version || github.ref_name }}
          body: ${{ github.event.inputs.release_notes || 'No release notes provided' }}
          draft: false
          prerelease: ${{ github.event.inputs.is_stable != 'true' }}
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
