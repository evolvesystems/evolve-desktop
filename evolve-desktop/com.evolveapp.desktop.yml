app-id: com.evolveapp.desktop
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: evolve-desktop
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.FileChooser
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=org.freedesktop.secrets
  - --filesystem=xdg-config
  - --filesystem=xdg-data
  - --filesystem=xdg-download
modules:
  # System tray support via Flathub shared modules
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  # The app binary
  - name: evolve-desktop
    buildsystem: simple
    build-commands:
      - install -Dm755 evolve-desktop /app/bin/evolve-desktop
      - install -Dm644 icon.png /app/share/icons/hicolor/192x192/apps/com.evolveapp.desktop.png
      - install -Dm644 com.evolveapp.desktop.desktop /app/share/applications/com.evolveapp.desktop.desktop
    sources:
      - type: file
        path: evolve-desktop
      - type: file
        path: icon.png
      - type: file
        path: com.evolveapp.desktop.desktop
