<!DOCTYPE html>
<html style="height:100%;margin:0;padding:0">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:rgb(15,15,25); }
body { display:flex; align-items:center; justify-content:center; }
@keyframes spin { to { transform:rotate(360deg) } }
.spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.1); border-top-color:#3b82f6; border-radius:50%; animation:spin 0.7s linear infinite; }
.label { color:rgba(255,255,255,0.5); font-size:13px; margin-top:16px; font-family:system-ui,-apple-system,sans-serif; text-align:center; }
</style>
</head>
<body>
<div>
  <div class="spinner"></div>
  <div class="label">Loading&hellip;</div>
</div>
</body>
</html>
