<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
}
.logo {
    width: 96px;
    height: 96px;
    border-radius: 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 24px;
    box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4); }
    50% { transform: scale(1.05); box-shadow: 0 25px 70px rgba(102, 126, 234, 0.6); }
}
h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
}
h1 span { color: rgba(255,255,255,0.5); font-weight: 400; }
.status {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.version {
    position: fixed;
    bottom: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
}
</style>
</head>
<body>
    <div class="logo">E</div>
    <h1>Evolve<span>App</span></h1>
    <div class="status">
        <div class="spinner"></div>
        Loading your workspace...
    </div>
    <div class="version">EvolveApp Desktop</div>
</body>
</html>
